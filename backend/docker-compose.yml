version: "3.9"

# ─── Shared config applied to all app services via YAML anchor ───────────────
x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: portfolio-bot-backend
  env_file:
    - .env

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # One-shot migration runner — exits after applying pending Prisma migrations.
  # api and worker wait for this to complete successfully before starting.
  migrate:
    <<: *app
    container_name: migrate
    command: npm run prisma:migrate:deploy
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app
    container_name: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    <<: *app
    container_name: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  # ── Backing services ──────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
